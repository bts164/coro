site_name: C++ Coro Library
docs_dir: doc
exclude_docs: |
  pdf/
watch:
  - include/
validation:
  nav:
    not_found: ignore
theme:
  name: readthedocs
extra_css:
  - extra.css
markdown_extensions:
  - footnotes
  - admonition
  - mkdocs_graphviz

plugins:
  - search
  - mermaid2:
      version: '11.13.0'
  - mkdoxy:
      doxygen-bin-path: doxygen
      projects:
        coro:
          src-dirs: include/coro src
          full-doc: true
          doxy-cfg:
            EXTRACT_ALL: "YES"
            GENERATE_HTML: "NO"
            GENERATE_XML: "YES"
nav:
  - Introduction: index.md
  - Getting Started Guide: getting_started.md
  - Library Usage Guidelines: guidelines.md
  - Cheat Sheet: cheatsheet.md
  - API Reference:
    - Key Types:
      - Concepts:
        - Future (concept): coro/future_8h.md
        - Stream (concept): coro/stream_8h.md
      - Runtime & Executors:
        - Runtime: coro/classcoro_1_1Runtime.md
        - SingleThreadedExecutor: coro/classcoro_1_1SingleThreadedExecutor.md
        - SingleThreadedUvExecutor: coro/classcoro_1_1SingleThreadedUvExecutor.md
        - WorkStealingExecutor: coro/classcoro_1_1WorkStealingExecutor.md
        - WorkSharingExecutor: coro/classcoro_1_1WorkSharingExecutor.md
      - Coroutine Types:
        - Coro: coro/classcoro_1_1Coro.md
        - CoroStream: coro/classcoro_1_1CoroStream.md
      - Task Handles:
        - JoinHandle: coro/classcoro_1_1JoinHandle.md
        - StreamHandle: coro/classcoro_1_1StreamHandle.md
        - SpawnBuilder: coro/classcoro_1_1SpawnBuilder.md
        - StreamSpawnBuilder: coro/classcoro_1_1StreamSpawnBuilder.md
        - spawn: coro/namespacecoro/#function-spawn
        - spawn_on: coro/namespacecoro/#function-spawn_on
        - spawn_blocking: coro/namespacecoro/#function-spawn_blocking
        - JoinSet: coro/classcoro_1_1JoinSet.md
      - Channels:
        - Oneshot:
          - OneshotSender: coro/classcoro_1_1oneshot_1_1OneshotSender.md
          - OneshotReceiver: coro/classcoro_1_1oneshot_1_1OneshotReceiver.md
        - Mpsc:
          - MpscSender: coro/classcoro_1_1mpsc_1_1MpscSender.md
          - MpscReceiver: coro/classcoro_1_1mpsc_1_1MpscReceiver.md
        - Watch:
          - WatchSender: coro/classcoro_1_1watch_1_1WatchSender.md
          - WatchReceiver: coro/classcoro_1_1watch_1_1WatchReceiver.md
      - Combinators:
        - join: coro/namespacecoro/#function-join
        - select: coro/namespacecoro/#function-select
      - Timers:
        - timeout: coro/namespacecoro/#function-timeout
        - sleep_for: coro/namespacecoro/#function-sleep_for
        - SleepFuture: coro/structcoro_1_1SleepFuture.md
    - All Classes: coro/classes.md
    - Namespaces: coro/namespaces.md
    - Files: coro/files.md
  - Internal Design Details:
    - Architecture Overview: design/architecture.md
    - Foundational Model:
      - Futures and Streams: design/future_and_stream.md
      - Tasks, Wakers, and Context: design/waker_and_context_propagation.md
      - Coroutine Frame Lifetime: design/coroutine_scope.md
      - Task Ownership Model: design/task_ownership.md
      - Cancellation Token: design/cancellation_token.md
    - Runtime & Scheduling:
      - Runtime, Tasks, and Executors: design/task_and_executor.md
      - Executor Scheduling Design: design/executor_design.md
      - Work-Stealing Scheduler: design/work_stealing_executor.md
      - Blocking Thread Pool: design/spawn_blocking.md
    - I/O Subsystem:
      - libuv Integration: design/libuv_integration.md
      - I/O Coroutines: design/io_coroutine.md
      - File I/O: design/file_io.md
      - TCP & WebSocket: design/websocket_stream.md
      - Poll Streams: design/poll_streams.md
      - Pipelined I/O: design/pipe_streaming.md
    - Synchronization & Combinators:
      - Channels: design/channels.md
      - JoinSet: design/join_set.md
      - Select: design/select.md
    - Platform & Integration:
      - Raspberry Pi Pico Port: design/pico_port.md
      - ISR Safety: design/isr_safety.md
    - Module Structure: design/module_structure.md
  - Examples & Tutorials:
    - Examples: tutorials/examples.md
    - gRPC Tutorial: tutorials/grpc_tutorial.md
  - Roadmap and Future Plans:
    - Roadmap Overview: roadmap.md
