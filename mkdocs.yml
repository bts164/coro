site_name: C++ Coro Library
docs_dir: doc
watch:
  - include/
theme:
  name: readthedocs
plugins:
  - search
  - mermaid2:
      version: '11.13.0'
  - mkdoxy:
      projects:
        coro:
          src-dirs: include/coro
          doxygen-bin-path: doxygen
          full-doc: true
          doxygen-params:
            EXTRACT_ALL: "YES"
            GENERATE_HTML: "NO"
            GENERATE_XML: "YES"
nav:
  - Introduction: index.md
  - Getting Started Guide: getting_started.md
  - Library Usage Guidelines: guidelines.md
  - API Reference:
    - Key Types:
      - Runtime & Executors:
        - Runtime: coro/classcoro_1_1Runtime.md
        - SingleThreadedExecutor: coro/classcoro_1_1SingleThreadedExecutor.md
        - WorkStealingExecutor: coro/classcoro_1_1WorkStealingExecutor.md
        - WorkSharingExecutor: coro/classcoro_1_1WorkSharingExecutor.md
      - Coroutine Types:
        - Coro: coro/classcoro_1_1Coro.md
        - CoroStream: coro/classcoro_1_1CoroStream.md
      - Task Handles:
        - JoinHandle: coro/classcoro_1_1JoinHandle.md
        - SpawnBuilder: coro/classcoro_1_1SpawnBuilder.md
        - StreamSpawnBuilder: coro/classcoro_1_1StreamSpawnBuilder.md
        - StreamHandle: coro/classcoro_1_1StreamHandle.md
      - Combinators:
        - JoinSet: coro/classcoro_1_1JoinSet.md
        - JoinFuture: coro/classcoro_1_1JoinFuture.md
        - SelectFuture: coro/classcoro_1_1SelectFuture.md
      - Timers:
        - SleepFuture: coro/structcoro_1_1SleepFuture.md
    - Concepts & Free Functions:
      - Future (concept): coro/future_8h.md
      - Stream (concept): coro/stream_8h.md
      - join(): coro/join_8h.md
      - select(): coro/select_8h.md
      - sleep_for(): coro/sleep_8h.md
      - timeout(): coro/timeout_8h.md
      - spawn(): coro/runtime_8h.md
    - All Classes: coro/classes.md
    - Namespaces: coro/namespaces.md
    - Files: coro/files.md
  - Internal Design Details:
    - Futures and Streams: future_and_stream.md
    - Tasks, Wakers, and Context: waker_and_context_propagation.md
    - Tasks, Executors, and Runtime: task_and_executor.md
    - Executor Design:
      - Overview: executor_design.md
      - Work-Stealing Scheduler: work_stealing_executor.md
    - I/O Integration:
      - libuv Integration: libuv_integration.md
      - WebSocket Stream: websocket_stream.md
    - Synchronization:
      - Coroutine Scope: coroutine_scope.md
      - JoinSet: join_set.md
      - Channels: channels.md
      - Select: select.md
    - Module Structure: module_structure.md
  - Examples: examples.md
  - Roadmap and Future Plans:
    - Roadmap Overview: roadmap.md
